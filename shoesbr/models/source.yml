# O source quer dizer quais são as fontes de dados:

version: 2
sources:
    - name: landing
      database: shoesbr
      schema: landing
      tables:
        - name: clientes
          description: "Tabela de clientes do e-commerce de sapatos"
          columns: 
            - name: customer_id
              description: "Identificador único do cliente"

            - name: name
              description: "Nome do cliente"

            - name: address
              description: "Endereço do cliente"

            - name: phone
              description: "Número de telefone do cliente"

            - name: email
              description: "E-mail do cliente"

        - name: produtos
          description: "Tabela de produtos do e-commerce de sapatos"
          columns: 
            - name: product_id
              description: "Identificador único do produto"
            - name: name
              description: "Nome do produto"
            - name: price
              description: "Preço do produto"
        - name: vendas
          description: "Tabela de vendas do e-commerce de sapatos"              
          columns:
                - name: purchase_id
                  description: "Identificador único da compra"

                - name: customer_id
                  description: "Identificador único do cliente"

                - name: product_id
                  description: "Identificador único do produto"

                - name: date
                  description: "Data da compra"

                - name: quantity
                  description: "Quantidade de produtos comprados"

                - name: total_price
                  description: "Preço total da compra"

                - name: payment_method
                  description: " Método de pagamento utilizado"
        - name: estorno
          description: "Tabela de estornos do e-commerce de sapatos"
          columns:
            - name: purchase_id
              description: "Identificador da compra"

            - name: customer_id
              description: "Identificador do cliente"

            - name: product_id
              description: "Identificador do produto"

            - name: refund_amount
              description: "Valor do estorno"

            - name: refund_reason
              description: "Motivo do estorno"

            - name: refund_date
              description: "Data do estorno"          
          
          
    

              