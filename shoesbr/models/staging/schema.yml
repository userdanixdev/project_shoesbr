version: 2

models:
  - name: stg_clientes
    description: " Tabela da zona Staging ( BOA PRÁTICA ) de dados dos clientes"
    columns: 
      - name: customer_id
        description: "identificador único do cliente"
        tests: 
          - unique
          - not_null
      - name: customer_name
        description: "Nome completo do cliente"
      - name: customer_address
        description: "Endereço do cliente"
      - name: customer_phone
        description: "Número de telefone do cliente"
      - name: customer_email
        description: "E-mail do cliente."                                  
  - name: stg_produtos
    description: "Tabela staging com dados de produtos."        
    columns: 
      - name: product_id
        description: "Identificador único do produto"
        tests:
          - unique
          - not_null
      - name: name_product
        description: "Nome do produto"          
      - name: price_product
        description: " Preço do produto"        
  - name: stg_vendas
    description: " Tabela staging com dados de vendas"        
    columns:
      - name: purchase_id
        description: "Identificador único de venda"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Identificador único do cliente"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_clientes')          
                field: customer_id
      - name: product_id
        description: "Identificador do produto"
        tests: 
          - not_null
          - relationships:
              arguments:
                to: ref('stg_produtos')
                field: product_id              
      - name: purchase_date
        description: "Data da compra"
      - name: quantity
        description: "Quantidade de produtos comprados"
      - name: total_price
        description: "Preço total da compra"
      - name: payment_method
        description: "Método de pagamento utilizado"

  - name: stg_estorno
    description: "Registros de estornos com informações do cliente, produto, data e motivo"
    columns: 
      - name: purchase_id
        description: "Identificador de compra estornada"
        tests: 
          - relationships:
              arguments:
                to: ref('stg_vendas')
                field: purchase_id
      - name: customer_id
        description: "Identificador do cliente"
        tests: 
          - relationships:
              arguments:
                to: ref('stg_clientes')
                field: customer_id
                
      - name: product_id
        description: "Identificador do produto estornado"
        tests: 
          - relationships:
              arguments:
                to: ref('stg_produtos')
                field: product_id
      - name: refund_amount
        description: "Identificador de compra estornada"
                               
      - name: refund_date
        description: " Data do estorno"
            
      - name: refund_reason
        description: " Motivo do estorno"
        tests:
            - accepted_values:
                arguments:
                values: ["Produto com defeito","Arrependimento", "Produto Incorreto", "Outro"]
      
        
 
 
                            
              
